<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ 技能五子棋 · 掌上对弈</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #2b5a3a 0%, #1d3e2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷体', 'PingFang SC', cursive, sans-serif;
            margin: 0;
            padding: 12px;
            touch-action: pan-y;
        }

        /* ---------- 精美技能讲解层 ---------- */
        .tutorial-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
            animation: fadeIn 0.3s;
        }
        .tutorial-card {
            max-width: 720px;
            width: 100%;
            background: #efe0c9;
            background-image: radial-gradient(circle at 20% 30%, #f8efda, #dac29c);
            border: 6px solid #b38b5b;
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 2px 8px #fff3e0;
            padding: 20px 16px 24px;
            color: #2d2416;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tutorial-title {
            text-align: center;
            font-size: clamp(22px, 6vw, 36px);
            font-weight: 900;
            color: #3b2c1a;
            text-shadow: 2px 2px 0 #eec77e;
            margin: 0 0 10px;
            letter-spacing: 2px;
        }
        .tutorial-sub {
            text-align: center;
            font-size: 14px;
            margin-bottom: 16px;
            border-bottom: 2px dashed #9b7e5a;
            padding-bottom: 10px;
        }
        .skill-legend {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px 8px;
            margin-bottom: 20px;
        }
        .legend-item {
            background: #3e2e1bc9;
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 12px 12px;
            border: 2px solid #e9c484;
            box-shadow: inset 0 1px 4px #ffe3a3, 0 4px 0 #5e401e;
            color: #fbf3df;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legend-icon {
            font-size: 32px;
            background: #1f2e16;
            width: 48px; height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #dbb067;
            box-shadow: inset 0 -2px 0 #7a5c33;
        }
        .legend-text {
            font-weight: bold;
            font-size: 15px;
            line-height: 1.3;
        }
        .legend-text small { opacity: 0.9; font-size: 13px; display: block; }
        .close-tutorial-btn {
            background: #9f7e42;
            border: none;
            border-bottom: 6px solid #4d3116;
            color: #fcf0d5;
            font-size: 28px;
            font-weight: bold;
            padding: 16px 24px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            cursor: pointer;
            box-shadow: 0 6px 0 #3a281a, 0 6px 12px black;
            transition: 0.08s;
            touch-action: manipulation;
            border: 2px solid #ebc47f;
            display: block;
        }
        .close-tutorial-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 #3a281a, 0 6px 12px black; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ---------- 主游戏 ---------- */
        .game-container {
            background: #c9a87c;
            background-image: radial-gradient(circle at 25% 30%, #e0c9a6, #b58b5a);
            padding: 16px 12px 20px;
            border-radius: 40px 40px 32px 32px;
            box-shadow: 0 20px 20px rgba(0,0,0,0.5), inset 0 2px 5px #ffeecc;
            border: 5px solid #a57c5a;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #f9eed7;
            text-shadow: 2px 2px 0 #5d3e1e;
            font-size: clamp(18px, 5vw, 24px);
            font-weight: bold;
            padding: 0 6px 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .turn-indicator {
            background: #2c2c2c;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: inset 0 -3px 0 #6b4f32, 0 4px 0 #371f0e;
            font-size: clamp(16px, 4.5vw, 20px);
            color: #f5e1be;
            border: 2px solid #cfb087;
            white-space: nowrap;
        }
        .turn-indicator span { color: #ffd966; font-weight: 900; margin-left: 6px; }

        .board-wrapper {
            display: flex;
            justify-content: center;
            margin: 6px 0 10px;
            background: #ebc28e;
            padding: 16px 12px 12px;
            border-radius: 48px 48px 30px 30px;
            box-shadow: inset 0 -6px 0 #9b7b56, 0 8px 15px #3f2e1b;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 600px;
            aspect-ratio: 1/1;
            background: #f2dbb0;
            border-radius: 20px;
            box-shadow: 0 0 0 5px #7b5d40, 0 12px 20px #1e2b1a;
            cursor: pointer;
            transition: all 0.1s;
            touch-action: none;
        }

        .board-shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            25% { transform: translate(-2px, 0px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, 2px); }
            100% { transform: translate(0, 0); }
        }
        .board-flash-red { animation: flashRed 0.3s 2; }
        @keyframes flashRed {
            0% { box-shadow: 0 0 0 5px #ff0000, 0 12px 20px #1e2b1a; }
            50% { box-shadow: 0 0 15px 10px #ff6600, 0 12px 20px #1e2b1a; }
            100% { box-shadow: 0 0 0 5px #7b5d40, 0 12px 20px #1e2b1a; }
        }

        .reverse-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; z-index: 10; gap: 15px;
        }
        .reverse-image {
            max-width: 70%; max-height: 50%; border-radius: 20px; border: 4px solid gold;
            box-shadow: 0 0 30px rgba(255,215,0,0.8); opacity: 0; transform: scale(0.5);
            animation: imagePopIn 3.5s ease-out forwards; pointer-events: none;
        }
        @keyframes imagePopIn {
            0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            30% { opacity: 1; transform: scale(1.05) rotate(0deg); }
            70% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(1.2) rotate(5deg); }
        }
        .reverse-text {
            font-size: clamp(32px, 12vw, 60px); font-weight: 900; color: gold;
            text-shadow: 4px 4px 0 #8b0000, 0 0 20px #fff;
            animation: reverseTextAnim 3.5s ease-out forwards; opacity: 0; white-space: nowrap;
        }
        @keyframes reverseTextAnim {
            0% { opacity: 0; transform: scale(0.2) rotate(-180deg); }
            30% { opacity: 1; transform: scale(1.2) rotate(0deg); }
            70% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(1.5) rotate(10deg); }
        }

        /* 胜利按钮区域 —— 平时隐藏，胜利时显示 (flex) 并拥有背景边框 */
        .victory-top-actions {
            display: none;               /* 默认隐藏不占位 */
            gap: 20px;
            justify-content: center;
            margin: 20px 0 28px;
            padding: 16px 12px;
            background: #5f3f2e;
            border: 4px solid #eebb55;
            border-radius: 60px;
            box-shadow: inset 0 2px 6px #eebb55aa, 0 8px 0 #3b2a1a, 0 10px 15px #1e1e1e;
            align-items: center;
        }

        #triggerReverse, #restartBtn {
            background: #3b1e2b; border: 3px solid #ffb347; color: #fff1b5;
            font-size: clamp(20px, 5vw, 24px); font-weight: bold;
            padding: 12px 28px; border-radius: 50px;
            box-shadow: 0 6px 0 #4f2b1a; cursor: pointer;
            touch-action: manipulation; transition: 0.07s;
            min-width: 160px; text-align: center;
        }
        #restartBtn { background: #2b4f5c; border-color: #7ec8e0; }
        #triggerReverse:active, #restartBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2c1a0e; }

        .skill-panels {
            display: flex; gap: 16px; justify-content: center;
            margin-top: 8px; flex-wrap: wrap;
        }
        .player-panel {
            background: #2d4a33; border: 3px solid #e3c184;
            border-radius: 40px 40px 20px 20px; padding: 14px 10px 12px;
            box-shadow: 0 6px 0 #1f5a2a, inset 0 2px 8px #b8d9a5;
            flex: 1 1 260px; min-width: 240px; max-width: 340px;
        }
        .panel-title {
            text-align: center; color: #fbe49b;
            font-size: clamp(20px, 6vw, 26px); font-weight: bold;
            margin-top: -32px; margin-bottom: 12px; background: #2d4a33;
            display: inline-block; padding: 4px 20px; border-radius: 40px;
            border: 2px solid #e3c184; transform: translateY(-50%);
            white-space: nowrap;
        }
        .skill-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px 10px;
        }
        .skill-btn {
            background: #3b2b1a; border: 3px outset #c9a35c;
            color: #faeac6; font-size: clamp(14px, 3.8vw, 18px);
            font-weight: bold; padding: 8px 2px; border-radius: 30px;
            box-shadow: 0 4px 0 #1f140c; cursor: pointer;
            transition: 0.07s ease; text-align: center;
            font-family: '华文楷体', 'PingFang SC', cursive;
            touch-action: manipulation; word-break: break-word; line-height: 1.2;
        }
        .skill-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1f140c; }
        .skill-btn:disabled { opacity: 0.5; transform: none; box-shadow: 0 4px 0 #1f140c; pointer-events: none; filter: grayscale(0.5); }

        .dice-area {
            background: #3e2e1b; border-radius: 30px; padding: 12px 8px;
            margin-top: 14px; display: flex; flex-direction: column;
            align-items: center; border: 2px solid #b5945a; width: 100%;
        }
        .dice-row { display: flex; justify-content: space-around; width: 100%; margin: 4px 0; font-size: clamp(16px, 4vw, 20px); }
        .dice-btn {
            background: #b4793b; border: none; border-radius: 30px; color: white; font-weight: bold;
            font-size: clamp(20px, 6vw, 26px); padding: 10px 20px; cursor: pointer;
            box-shadow: 0 5px 0 #5e3b1c; transition: 0.1s; touch-action: manipulation;
            width: fit-content; min-width: 140px;
        }
        .dice-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #5e3b1c; }
        .dice-result {
            background: #1d281b; padding: 10px 12px; border-radius: 40px; color: #ffd966;
            font-size: clamp(18px, 5vw, 22px); font-weight: 900; text-align: center;
            width: 100%; margin: 8px 0; word-break: break-word;
        }
        .dice-number { font-size: clamp(30px, 8vw, 40px); margin: 0 6px; }

        .status-msg {
            background: #1d2c1a; color: #ffde9e; padding: 8px 18px;
            border-radius: 30px; font-size: clamp(16px, 4vw, 18px);
            font-weight: bold; margin-top: 12px; border: 2px solid #ad8b5a;
            text-align: center; word-break: break-word;
        }
        .note { font-size: 13px; color: #dac292; margin-top: 6px; text-align: center; }

        @media (max-width: 480px) {
            .game-container { padding: 12px 8px 16px; }
            .board-wrapper { padding: 12px 8px 8px; }
            .victory-top-actions { margin: 16px 0 24px; padding: 12px 8px; }
        }
    </style>
</head>
<body>

<!-- 技能讲解层 -->
<div class="tutorial-overlay" id="tutorialOverlay">
    <div class="tutorial-card">
        <div class="tutorial-title">⚔️ 秘技·掌中谱 ⚔️</div>
        <div class="tutorial-sub">—— 咸阳湖秘闻 · 弈者必读 ——</div>
        <div class="skill-legend">
            <div class="legend-item"><div class="legend-icon">🌪️</div><div class="legend-text">飞沙走石 <small>移除对方一子，丢入咸阳湖</small></div></div>
            <div class="legend-item"><div class="legend-icon">❄️</div><div class="legend-text">静如止水 <small>冻结对手一回合</small></div></div>
            <div class="legend-item"><div class="legend-icon">🏋️</div><div class="legend-text">力拔山兮 <small>强行获胜！对手可用东山再起</small></div></div>
            <div class="legend-item"><div class="legend-icon">🤏</div><div class="legend-text">擒拿 <small>对抗飞沙走石，掷骰防守</small></div></div>
            <div class="legend-item"><div class="legend-icon">🌱</div><div class="legend-text">东山再起 <small>回溯，抵消力拔山兮</small></div></div>
            <div class="legend-item"><div class="legend-icon">💰</div><div class="legend-text">拾金不昧 <small>从咸阳湖捞回棋子</small></div></div>
            <div class="legend-item"><div class="legend-icon">🌀</div><div class="legend-text">两级反转 <small>胜利后图文彩蛋</small></div></div>
        </div>
        <button class="close-tutorial-btn" id="closeTutorialBtn">✨ 开始对弈 ✨</button>
    </div>
</div>

<div class="game-container">
    <div class="header">
        <div>⚔️ 技能五子棋 · 咸阳湖 ⚔️</div>
        <div class="turn-indicator">👑 回合 <span id="turnText">黑方</span></div>
    </div>

    <div class="board-wrapper" id="boardWrapper">
        <canvas id="boardCanvas" width="600" height="600"></canvas>
        <div class="reverse-overlay" id="reverseOverlay" style="display: none;">
            <img class="reverse-image" id="reverseImage" src="https://vpic-cover.puui.qpic.cn/c4101pdyg7v/c4101pdyg7v_1760242077_hz.jpg/496" alt="彩蛋图片">
            <div class="reverse-text" id="reverseText">🌀 两级反转 🌀</div>
        </div>
    </div>

    <!-- 胜利按钮区域：平时 display: none，胜利时设为 flex -->
    <div class="victory-top-actions" id="victoryActions">
        <button id="triggerReverse">🌀 两级反转</button>
        <button id="restartBtn">🔄 再来一局</button>
    </div>
<br>
    <!-- 双方技能面板 -->
    <div class="skill-panels">
        <div class="player-panel" style="border-color: #2f2f2f;">
            <div class="panel-title"> ⚫ 黑方技能 </div>
            <div class="skill-grid" id="blackSkills">
                <button class="skill-btn" data-skill="sand" data-player="black">🌪️飞沙走石</button>
                <button class="skill-btn" data-skill="still" data-player="black">❄️静如止水</button>
                <button class="skill-btn" data-skill="power" data-player="black">🏋️力拔山兮</button>
                <button class="skill-btn" data-skill="catch" data-player="black">🤏擒拿</button>
                <button class="skill-btn" data-skill="revive" data-player="black">🌱东山再起</button>
                <button class="skill-btn" data-skill="return" data-player="black">💰拾金不昧</button>
            </div>
        </div>
        <div class="player-panel" style="border-color: #e8e8e8;">
            <div class="panel-title"> ⚪ 白方技能 </div>
            <div class="skill-grid" id="whiteSkills">
                <button class="skill-btn" data-skill="sand" data-player="white">🌪️飞沙走石</button>
                <button class="skill-btn" data-skill="still" data-player="white">❄️静如止水</button>
                <button class="skill-btn" data-skill="power" data-player="white">🏋️力拔山兮</button>
                <button class="skill-btn" data-skill="catch" data-player="white">🤏擒拿</button>
                <button class="skill-btn" data-skill="revive" data-player="white">🌱东山再起</button>
                <button class="skill-btn" data-skill="return" data-player="white">💰拾金不昧</button>
            </div>
        </div>
    </div>

    <!-- 骰子区域 -->
    <div class="dice-area" id="diceArea" style="display: none;">
        <div class="dice-row"><span style="color: #ffaa66;">⚔️ 攻击方</span><span style="color: #66ccff;">🛡️ 防守方</span></div>
        <div class="dice-row"><span class="dice-number" id="atkDice">⚀</span><span style="font-size:28px;">VS</span><span class="dice-number" id="defDice">⚀</span></div>
        <div class="dice-result" id="diceResult">等待掷骰...</div>
        <button class="dice-btn" id="rollDiceBtn">🎲 掷骰子</button>
    </div>

    <div class="status-msg" id="statusMessage">⚫ 黑方回合 · 点击棋盘落子或使用技能</div>
    <div class="note">✨ 飞沙·拾金与咸阳湖有缘 ✨</div>
</div>

<script>
    (function(){
        "use strict";

        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const boardSize = 15;
        let board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
        let turn = 'black';
        let gameOver = false;
        let frozenPlayer = null;
        let lastRemoved = null;
        let powerSnapshot = null;
        let awaitingCounter = false;
        let skillSelecting = false;
        let activeSkillHandler = null;

        let effect = { type: null, position: null, active: false, endTime: 0 };
        const colorMap = { 'black': 1, 'white': 2 };
        const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        const turnText = document.getElementById('turnText');
        const statusMsg = document.getElementById('statusMessage');
        const diceArea = document.getElementById('diceArea');
        const atkDiceSpan = document.getElementById('atkDice');
        const defDiceSpan = document.getElementById('defDice');
        const diceResult = document.getElementById('diceResult');
        const triggerReverseBtn = document.getElementById('triggerReverse');
        const restartBtn = document.getElementById('restartBtn');
        const victoryActions = document.getElementById('victoryActions');
        const reverseOverlay = document.getElementById('reverseOverlay');
        const reverseText = document.getElementById('reverseText');
        const reverseImage = document.getElementById('reverseImage');
        const tutorialOverlay = document.getElementById('tutorialOverlay');
        const closeTutorialBtn = document.getElementById('closeTutorialBtn');

        closeTutorialBtn.addEventListener('click', () => tutorialOverlay.style.display = 'none');

        function getOpponent(color) { return color === 'black' ? 'white' : 'black'; }

        function updateTurnDisplay() {
            turnText.innerText = turn === 'black' ? '黑方' : '白方';
            if (gameOver) return;
            statusMsg.innerText = frozenPlayer === turn ? `⚠️ ${turn==='black'?'黑方':'白方'} 被冻结` : `${turn==='black'?'⚫ 黑方':'⚪ 白方'}回合`;
        }

        function drawBoard() { /* 保持不变 */ 
            ctx.clearRect(0, 0, 600, 600);
            ctx.lineWidth = 1.8; ctx.strokeStyle = '#5f4c3b';
            for (let i = 0; i < boardSize; i++) {
                ctx.beginPath(); ctx.moveTo(40 + i * 37, 40); ctx.lineTo(40 + i * 37, 560); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(40, 40 + i * 37); ctx.lineTo(560, 40 + i * 37); ctx.stroke();
            }
            [[7,7],[3,3],[11,3],[3,11],[11,11]].forEach(([x, y]) => { ctx.beginPath(); ctx.arc(40 + x * 37, 40 + y * 37, 5, 0, 2*Math.PI); ctx.fillStyle = '#5f4c3b'; ctx.fill(); });
            for (let r = 0; r < boardSize; r++) for (let c = 0; c < boardSize; c++) {
                if (board[r][c] === 0) continue;
                let x = 40 + c * 37, y = 40 + r * 37;
                ctx.shadowColor = '#00000055'; ctx.shadowBlur = 8; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3;
                let gradient = ctx.createRadialGradient(x-5, y-5, 5, x, y, 25);
                if (board[r][c] === 1) { gradient.addColorStop(0, '#333'); gradient.addColorStop(0.8, '#111'); }
                else { gradient.addColorStop(0, '#f9f9fa'); gradient.addColorStop(0.9, '#b5b5b5'); }
                ctx.beginPath(); ctx.arc(x, y, 16, 0, 2*Math.PI); ctx.fillStyle = gradient; ctx.fill();
                ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
                ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
            }
            if (frozenPlayer) {
                let pieceVal = frozenPlayer === 'black' ? 1 : 2;
                ctx.save(); ctx.shadowColor = '#3ec1d3'; ctx.shadowBlur = 20; ctx.globalAlpha = 0.65;
                for (let r = 0; r < boardSize; r++) for (let c = 0; c < boardSize; c++) if (board[r][c] === pieceVal) {
                    ctx.beginPath(); ctx.arc(40 + c * 37, 40 + r * 37, 20, 0, 2*Math.PI); ctx.fillStyle = '#aaf0f1'; ctx.fill();
                }
                ctx.restore();
            }
            if (effect.active && Date.now() < effect.endTime) { drawEffect(effect); requestAnimationFrame(drawBoard); }
            else effect.active = false;
        }

        function drawEffect(e) { /* 简略，不影响功能 */ }

        function triggerEffect(type, row, col, duration=600) { effect = { type, position: {row, col}, active: true, endTime: Date.now()+duration }; drawBoard(); }

        function checkWin(row, col, playerVal) {
            const dirs = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx,dy] of dirs) {
                let cnt = 1;
                for (let i=1;i<5;i++) { let nr=row+i*dx,nc=col+i*dy; if (nr<0||nr>=15||nc<0||nc>=15||board[nr][nc]!==playerVal) break; cnt++; }
                for (let i=1;i<5;i++) { let nr=row-i*dx,nc=col-i*dy; if (nr<0||nr>=15||nc<0||nc>=15||board[nr][nc]!==playerVal) break; cnt++; }
                if (cnt>=5) return true;
            }
            return false;
        }

        function tryPlacePiece(row, col) {
            if (gameOver || frozenPlayer===turn || board[row][col]!==0) return false;
            let val = colorMap[turn];
            board[row][col] = val;
            drawBoard();
            if (checkWin(row, col, val)) {
                gameOver = true;
                statusMsg.innerText = `${turn==='black'?'⚫黑方':'⚪白方'} 获胜！`;
                victoryActions.style.display = 'flex';
                diceArea.style.display = 'none';
                disableAllSkills(true);
                return true;
            }
            turn = getOpponent(turn);
            if (frozenPlayer === turn) { frozenPlayer = null; turn = getOpponent(turn); }
            updateTurnDisplay();
            refreshSkillButtons();
            drawBoard();
            return true;
        }

        function refreshSkillButtons() {
            if (gameOver) { disableAllSkills(true); return; }
            document.querySelectorAll('.skill-btn[data-player]').forEach(btn => btn.disabled = (btn.dataset.player !== turn || awaitingCounter || skillSelecting));
        }

        function disableAllSkills(disable = true) { document.querySelectorAll('.skill-btn[data-player]').forEach(btn => btn.disabled = disable); }

        function rollDiceForCatch(attacker, defender, targetRow, targetCol) {
            awaitingCounter = true; skillSelecting = false; disableAllSkills(true);
            diceArea.style.display = 'flex'; atkDiceSpan.innerText = '⚀'; defDiceSpan.innerText = '⚀'; diceResult.innerText = '点击掷骰子';
            const rollBtn = document.getElementById('rollDiceBtn'); const newRollBtn = rollBtn.cloneNode(true); rollBtn.parentNode.replaceChild(newRollBtn, rollBtn);
            newRollBtn.onclick = () => {
                let atkRoll = Math.floor(Math.random()*6)+1, defRoll = Math.floor(Math.random()*6)+1;
                atkDiceSpan.innerText = diceFaces[atkRoll-1]; defDiceSpan.innerText = diceFaces[defRoll-1];
                let win = defRoll > atkRoll;
                diceResult.innerText = `攻击方 ${atkRoll} : 防守方 ${defRoll} · ${win?'防守成功':'防守失败'}`;
                if (!win) {
                    lastRemoved = { row: targetRow, col: targetCol, color: board[targetRow][targetCol] };
                    board[targetRow][targetCol] = 0;
                    triggerEffect('sand', targetRow, targetCol);
                    statusMsg.innerText = '🌪️ 棋子已经被丢入咸阳湖！';
                } else statusMsg.innerText = '🛡️ 擒拿成功！';
                setTimeout(() => { diceArea.style.display = 'none'; awaitingCounter = false; refreshSkillButtons(); drawBoard(); }, 1500);
            };
        }

        function handleSkillClick(e) {
            const btn = e.currentTarget;
            if (btn.disabled || gameOver || awaitingCounter || skillSelecting) return;
            const player = btn.dataset.player, skill = btn.dataset.skill;
            if (player !== turn) { alert('不是你的回合'); return; }

            if (skill === 'sand') {
                skillSelecting = true; disableAllSkills(true); statusMsg.innerText = '👆 点击对手棋子';
                const handler = (ev) => {
                    const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
                    const col = Math.round(((ev.clientX - rect.left) * scaleX - 40) / 37), row = Math.round(((ev.clientY - rect.top) * scaleY - 40) / 37);
                    if (row<0||row>=15||col<0||col>=15||board[row][col]===0) { cancelSelect(); return; }
                    let targetColor = board[row][col];
                    if ((player==='black' && targetColor!==2) || (player==='white' && targetColor!==1)) { alert('只能选对手棋子'); return; }
                    canvas.removeEventListener('click', handler); activeSkillHandler = null; skillSelecting = false;
                    if (confirm('对方是否使用【擒拿】？')) rollDiceForCatch(player, getOpponent(player), row, col);
                    else {
                        lastRemoved = { row, col, color: targetColor };
                        board[row][col] = 0;
                        triggerEffect('sand', row, col);
                        statusMsg.innerText = '🌪️ 飞沙走石！棋子已被丢入咸阳湖。';
                        refreshSkillButtons(); drawBoard();
                    }
                };
                function cancelSelect() { canvas.removeEventListener('click', handler); activeSkillHandler = null; skillSelecting = false; refreshSkillButtons(); }
                canvas.addEventListener('click', handler); activeSkillHandler = handler;
            }
            else if (skill === 'still') {
                frozenPlayer = getOpponent(player); statusMsg.innerText = `❄️ 静如止水！`;
                for (let r=0;r<15;r++) for (let c=0;c<15;c++) if ((player==='black'&&board[r][c]===2)||(player==='white'&&board[r][c]===1)) triggerEffect('still',r,c,800);
                drawBoard(); refreshSkillButtons();
            }
            else if (skill === 'power') {
                canvas.classList.add('board-flash-red','board-shake'); setTimeout(()=>canvas.classList.remove('board-flash-red','board-shake'),600);
                if (frozenPlayer === getOpponent(player)) { gameOver=true; statusMsg.innerText=`${player==='black'?'⚫黑方':'⚪白方'}力拔山兮获胜`; victoryActions.style.display='flex'; diceArea.style.display='none'; disableAllSkills(true); return; }
                powerSnapshot = { board: board.map(r=>[...r]), turn, frozen: frozenPlayer, lastRemoved: lastRemoved?{...lastRemoved}:null }; gameOver = true;
                if (confirm('对方是否使用【东山再起】？')) {
                    board = powerSnapshot.board.map(r=>[...r]); turn = powerSnapshot.turn; frozenPlayer = powerSnapshot.frozen; lastRemoved = powerSnapshot.lastRemoved; gameOver = false;
                    canvas.classList.add('board-fade'); setTimeout(()=>canvas.classList.remove('board-fade'),600);
                    statusMsg.innerText='🌱 东山再起！'; drawBoard(); refreshSkillButtons();
                    victoryActions.style.display = 'none';
                } else { disableAllSkills(true); victoryActions.style.display='flex'; diceArea.style.display='none'; statusMsg.innerText=`${player==='black'?'⚫黑方':'⚪白方'}力拔山兮获胜`; }
            }
            else if (skill === 'return') {
                if (!lastRemoved) { alert('咸阳湖里没有棋子'); return; }
                let {row,col,color}=lastRemoved; if (board[row][col]!==0) { alert('位置被占'); return; }
                board[row][col]=color; triggerEffect('return',row,col); lastRemoved=null;
                statusMsg.innerText='💰 拾金不昧！棋子已被从咸阳湖捡回。';
                drawBoard(); refreshSkillButtons();
            }
        }

        function canvasClickHandler(e) {
            if (gameOver || awaitingCounter || skillSelecting) return;
            const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
            const col = Math.round(((e.clientX - rect.left) * scaleX - 40) / 37), row = Math.round(((e.clientY - rect.top) * scaleY - 40) / 37);
            if (row>=0 && row<15 && col>=0 && col<15) tryPlacePiece(row, col);
        }

        function playReverseEffect() {
            reverseOverlay.style.display = 'flex';
            reverseText.style.animation = 'none'; reverseImage.style.animation = 'none';
            reverseText.offsetHeight; reverseImage.offsetHeight;
            reverseText.style.animation = 'reverseTextAnim 3.5s ease-out forwards';
            reverseImage.style.animation = 'imagePopIn 3.5s ease-out forwards';
            canvas.classList.add('board-flash-red');
            setTimeout(() => canvas.classList.remove('board-flash-red'), 600);
            setTimeout(() => { reverseOverlay.style.display = 'none'; }, 3500);
            statusMsg.innerText = '🌀 两级反转 · 图文并茂 🌀';
        }

        function initGame() {
            board = Array(15).fill().map(()=>Array(15).fill(0));
            turn = 'black'; gameOver = false; frozenPlayer = null; lastRemoved = null; powerSnapshot = null;
            awaitingCounter = false; skillSelecting = false;
            if (activeSkillHandler) { canvas.removeEventListener('click', activeSkillHandler); activeSkillHandler=null; }
            effect.active = false;
            victoryActions.style.display = 'none';
            diceArea.style.display = 'none';
            reverseOverlay.style.display = 'none';
            drawBoard(); updateTurnDisplay(); refreshSkillButtons();
        }

        canvas.addEventListener('click', canvasClickHandler);
        document.querySelectorAll('.skill-btn[data-player]').forEach(btn => btn.addEventListener('click', handleSkillClick));
        triggerReverseBtn.addEventListener('click', playReverseEffect);
        restartBtn.addEventListener('click', initGame);

        initGame();
    })();
</script>
</body>
</html>
